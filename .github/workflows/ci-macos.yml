name: CI (macOS)

on:
  push:
    branches:
      - master
      - 'dev-*'
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Swift ${{ matrix.swift }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Swift 5.10：macOS 14 + Xcode 15.4
          - swift: "5.10"
            os: macos-14
            xcode: "15.4"

          # Swift 6.0：macOS 14 + Xcode 16.2
          - swift: "6.0"
            os: macos-14
            xcode: "16.2"

          # Swift 最新：macOS 15 + 默认最新 Xcode
          - swift: "latest"
            os: macos-15
            xcode: "latest-stable"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode }}

      - name: Verify Swift version
        run: |
          echo "Selected Xcode:"
          xcode-select -p
          echo "Swift version:"
          swift --version

      - name: Build
        run: swift build

      - name: Run unit tests
        run: swift test --filter AlibabaCloudOSSUnitTests --filter AlibabaCloudOSSExtensionUnitTests