name: CI (macOS)

on:
  push:
    branches:
      - master
      - 'dev-*'
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Xcode ${{ matrix.xcode }} on macOS
    runs-on: macos-latest
    strategy:
      matrix:
        xcode: ["16.2", "16.3"]
    env:
      DEVELOPER_DIR: /Applications/Xcode_${{ matrix.xcode }}.app/Contents/Developer

    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Run unit tests
        run: swift test --filter AlibabaCloudOSSUnitTests --filter AlibabaCloudOSSExtensionUnitTests
